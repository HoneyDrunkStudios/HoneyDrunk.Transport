# SonarQube Cloud project configuration for HoneyDrunk.Transport.
# Project imported via the SonarQube Cloud GitHub App; quality gate runs in
# job-sonarcloud.yml (HoneyDrunk.Actions) on every pull request to main.
# Post-merge analysis on `push` to `main` is deferred (cost discipline per
# ADR-0011 D11 + D6); the upstream job-sonarcloud.yml supports both event
# types if push-time analysis is ever wanted.
#
# This file lives at HoneyDrunk.Transport/sonar-project.properties (inside the
# inner project subdir, next to HoneyDrunk.Transport.slnx). All sonar.sources /
# sonar.tests paths are relative to this subdir, which matches the
# working-directory the reusable job-sonarcloud.yml runs from.

sonar.organization=honeydrunkstudios
sonar.projectKey=honeydrunkstudios_HoneyDrunk.Transport
sonar.projectName=HoneyDrunk.Transport

# Sources — runtime + providers, relative to working-directory (HoneyDrunk.Transport/)
sonar.sources=HoneyDrunk.Transport,HoneyDrunk.Transport.AzureServiceBus,HoneyDrunk.Transport.InMemory,HoneyDrunk.Transport.StorageQueue

# Tests
sonar.tests=HoneyDrunk.Transport.Tests

# Coverage (consumed by job-sonarcloud.yml after Cobertura → OpenCover conversion)
sonar.cs.opencover.reportsPaths=**/coverage.opencover.xml

# Exclusions — generated code, build outputs, and the sample host
sonar.exclusions=**/obj/**,**/bin/**,**/*.Designer.cs,**/HoneyDrunk.Transport.SandboxNode/**

# Coverage exclusions — sample host is exercise/illustration code, not production
sonar.coverage.exclusions=**/HoneyDrunk.Transport.SandboxNode/**

# New Code definition — inherits from organization default (30 days)
